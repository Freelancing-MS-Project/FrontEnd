<section class="contact section">
  <div class="container section-title" data-aos="fade-up">
    <span>Authentification</span>
    <h2>Connexion</h2>
    <p>Connexion classique par email et mot de passe.</p>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="contact-form card" data-aos="fade-up" data-aos-delay="200">
          <div class="card-body p-4 p-lg-5">
            <form [formGroup]="loginForm" (ngSubmit)="submit()" class="php-email-form">
              <div class="row gy-4">
                <div class="col-12">
                  <input id="email" type="email" class="form-control" formControlName="email" placeholder="Email" />
                </div>
                <div class="col-12">
                  <input id="password" type="password" class="form-control" formControlName="password" placeholder="Mot de passe" />
                </div>
                <div class="col-12" *ngIf="errorMessage">
                  <div class="error-message d-block">{{ errorMessage }}</div>
                </div>
                <div class="col-12 text-center">
                  <button type="submit" class="btn btn-submit w-100" [disabled]="isSubmitting">
                    {{ isSubmitting ? 'Connexion...' : 'Se connecter' }}
                  </button>
                </div>
                <div class="col-12 text-center">
                  <a routerLink="/face-login" class="me-3">Connexion faciale</a>
                  <a routerLink="/register">Créer un compte</a>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
