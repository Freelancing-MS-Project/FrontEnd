<section class="contact section">
  <div class="container section-title" data-aos="fade-up">
    <span>Authentification</span>
    <h2>Connexion faciale</h2>
    <p>Envoi d’une image vers le backend USER.</p>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="contact-form card" data-aos="fade-up" data-aos-delay="200">
          <div class="card-body p-4 p-lg-5">
            <form [formGroup]="form" (ngSubmit)="submit()" class="php-email-form">
              <div class="row gy-4">
                <div class="col-12">
                  <input id="file" class="form-control" type="file" accept="image/*" (change)="onFileChange($event)" />
                </div>
                <div class="col-12">
                  <input id="tolerance" class="form-control" type="number" step="0.01" min="0" formControlName="tolerance" placeholder="Tolérance optionnelle" />
                </div>
                <div class="col-12" *ngIf="errorMessage">
                  <div class="error-message d-block">{{ errorMessage }}</div>
                </div>
                <div class="col-12" *ngIf="successMessage">
                  <div class="sent-message d-block">{{ successMessage }}</div>
                </div>
                <div class="col-12 text-center">
                  <button type="submit" class="btn btn-submit w-100" [disabled]="isSubmitting">
                    {{ isSubmitting ? 'Vérification...' : 'Se connecter par image' }}
                  </button>
                </div>
                <div class="col-12 text-center">
                  <a routerLink="/login" class="me-3">Connexion classique</a>
                  <a routerLink="/register">Créer un compte</a>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
