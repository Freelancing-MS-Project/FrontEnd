<section class="contact section">
  <div class="container section-title" data-aos="fade-up">
    <span>Authentification</span>
    <h2>Inscription</h2>
    <p>Création d’un compte USER en JSON ou multipart selon l’image fournie.</p>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="contact-form card" data-aos="fade-up" data-aos-delay="200">
          <div class="card-body p-4 p-lg-5">
            <form [formGroup]="registerForm" (ngSubmit)="submit()" class="php-email-form">
              <div class="row gy-4">
                <div class="col-md-6">
                  <input id="email" type="email" class="form-control" formControlName="email" placeholder="Email" />
                </div>
                <div class="col-md-6">
                  <input id="password" type="password" class="form-control" formControlName="password" placeholder="Mot de passe" />
                </div>
                <div class="col-md-6">
                  <input id="firstName" type="text" class="form-control" formControlName="firstName" placeholder="Prénom" />
                </div>
                <div class="col-md-6">
                  <input id="lastName" type="text" class="form-control" formControlName="lastName" placeholder="Nom" />
                </div>
                <div class="col-md-6">
                  <input id="cin" type="text" class="form-control" formControlName="cin" placeholder="CIN" />
                </div>
                <div class="col-md-6">
                  <select id="role" class="form-select" formControlName="role">
                    <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
                  </select>
                </div>
                <div class="col-12">
                  <input id="file" type="file" class="form-control" accept="image/*" (change)="onFileChange($event)" />
                </div>
                <div class="col-12" *ngIf="errorMessage">
                  <div class="error-message d-block">{{ errorMessage }}</div>
                </div>
                <div class="col-12" *ngIf="successMessage">
                  <div class="sent-message d-block">{{ successMessage }}</div>
                </div>
                <div class="col-12 text-center">
                  <button type="submit" class="btn btn-submit w-100" [disabled]="isSubmitting">
                    {{ isSubmitting ? 'Création...' : 'Créer le compte' }}
                  </button>
                </div>
                <div class="col-12 text-center">
                  <a routerLink="/login">Retour à la connexion</a>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
